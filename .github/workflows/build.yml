name: Build Dummy AAB

on:
  workflow_dispatch: # Allows you to run this manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build AAB
        run: |
          cd hello-jni
          chmod +x gradlew
          ./gradlew bundleDebug

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v3
        with:
          name: dummy-app-bundle
          path: hello-jni/app/build/outputs/bundle/debug/app-debug.aab
